  :root {
    --bg-1: #F6F3EC;
    --bg-2: #F6F3EC;
    --card: #FBFAF6;
    --surface: #FBFAF6;
    --border: #E9E2D3;
    --text: #262420;
    --text-muted: #8C8372;
    --text-dim: #B7AE9C;
    --accent: #B49A76;
    --accent-dark: #9C8362;
    --sand: #E4C98A;
    --gold: #9C8362;
    --st-new: #C98A4B;
    --st-new-bg: rgba(201,138,75,0.12);
    --st-progress: #6E92A8;
    --st-progress-bg: rgba(110,146,168,0.12);
    --st-confirmed: #6E9C7A;
    --st-confirmed-bg: rgba(110,156,122,0.14);
    --st-closed: #A39A8A;
    --st-closed-bg: rgba(163,154,138,0.16);
    --danger: #C4634A;
    --danger-bg: rgba(196,99,74,0.08);
  }

  * { box-sizing: border-box; }

  html {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  html::-webkit-scrollbar { display: none; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-1);
    color: var(--text);
    font-family: 'Jost', -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .serif {
    font-family: 'Jost', sans-serif;
    font-weight: 600;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    padding-top: max(14px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px 12px; /* на узком экране кнопки аккуратно уходят на вторую строку */
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 40;
  }

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .brand h1 { font-size: 17px; font-weight: 500; margin: 0; letter-spacing: 0.01em; line-height: 1.2; }
  .brand p { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 1px 0 0; }

  .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  /* Дата в аккуратной «таблетке» в одном стиле с круглыми кнопками */
  .sync-indicator {
    display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--text-muted);
    white-space: nowrap; height: 32px; box-sizing: border-box;
    padding: 0 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--card);
  }
  #sync-label { display: flex; flex-direction: column; line-height: 1.35; }
  #sync-label span:last-child { color: var(--text); }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.25s ease;
  }
  .sync-dot.syncing {
    background: var(--st-confirmed);
    animation: sync-pulse 1.1s infinite;
  }
  @keyframes sync-pulse {
    0% { box-shadow: 0 0 0 0 rgba(110,156,122,0.5); }
    70% { box-shadow: 0 0 0 5px rgba(110,156,122,0); }
    100% { box-shadow: 0 0 0 0 rgba(110,156,122,0); }
  }

  .bell-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-dark); cursor: pointer; flex-shrink: 0;
    position: relative;
  }
  .bell-btn svg { width: 16px; height: 16px; }
  .bell-btn .dot {
    position: absolute; top: 5px; right: 6px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--st-new); display: none;
  }
  .bell-btn.has-alert .dot { display: block; }

  main { padding: 16px 20px 32px; max-width: 1200px; margin: 0 auto; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    text-align: left;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 14px;
    cursor: pointer;
    color: inherit;
    font: inherit;
  }
  .stat-card.active { border-color: var(--accent); background: rgba(180,154,118,0.08); }
  .stat-card .num { font-size: 22px; font-weight: 500; margin: 0; }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); margin: 2px 0 0; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; background: var(--surface); flex: 1; min-width: 240px;
  }
  .search-box input {
    background: transparent; border: none; outline: none; color: var(--text);
    font-size: 16px; width: 100%; /* минимум 16px, иначе iPhone зумит страницу при фокусе */
  }
  .search-box input::placeholder { color: var(--text-dim); }
  #search-clear {
    display: none; flex-shrink: 0; width: 22px; height: 22px;
    align-items: center; justify-content: center;
    border: none; border-radius: 50%; cursor: pointer;
    background: rgba(180,154,118,0.14); color: var(--text-muted); font-size: 11px; line-height: 1;
  }
  .search-box.has-value #search-clear { display: flex; }

  .filter-chips {
    display: flex; gap: 8px; flex-wrap: nowrap;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; -ms-overflow-style: none;
    padding-bottom: 2px;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    font-size: 12px; padding: 8px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent; color: var(--text-muted);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .chip.active { border-color: var(--accent); color: var(--accent-dark); background: rgba(76,134,168,0.06); }

  table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--card); }
  thead th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); background: #F7F5F0;
    padding: 12px 20px; font-weight: 600;
  }
  tbody tr { border-top: 1px solid var(--border); cursor: pointer; }
  tbody tr:hover { background: #FAF9F5; }
  tbody td { padding: 14px 20px; font-size: 14px; }
  td.muted { color: var(--text-muted); }

  .status-pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; display: inline-block; }

  .empty-row td { text-align: center; padding: 40px; color: var(--text-muted); }


  /* Detail drawer */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: none; z-index: 50;
    transition: opacity 0.2s ease;
  }
  .overlay.open { display: block; }
  .drawer {
    position: fixed; left: 0; right: 0; bottom: 0; width: 100%;
    max-width: 560px; margin: 0 auto;
    max-height: 88vh;
    background: var(--card); border: 1px solid var(--border); border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 12px 24px 28px;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 51;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.12);
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .drawer::-webkit-scrollbar { display: none; }
  .drawer.open { transform: translateY(0); }
  .drawer.dragging { transition: none; }

  .drag-handle {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 6px 0 14px;
    cursor: grab;
    touch-action: none;
  }
  .drag-handle .bar {
    width: 40px; height: 4px; border-radius: 999px; background: var(--border);
  }

  .drawer-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .drawer-head .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 0 0 4px; }
  .drawer-head h2 { margin: 0; font-size: 20px; }
  .close-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 4px;
  }
  .close-btn:hover { color: var(--text); }

  .status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .status-btn {
    font-size: 12px; padding: 9px 12px; border-radius: 999px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer;
    text-align: center; white-space: nowrap;
  }

  .contact-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .contact-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 12px 8px; border-radius: 12px; border: none;
    background: var(--accent); color: #fff; text-decoration: none;
    font-size: 11px; font-weight: 500; cursor: pointer;
  }
  .contact-btn:active { background: var(--accent-dark); }
  .contact-btn svg { width: 20px; height: 20px; }

  .primary-actions { display: flex; gap: 10px; margin-bottom: 24px; }
  .action-delete {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 12px 14px; border-radius: 10px; font-size: 13px; font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--danger); background: transparent; color: var(--danger);
  }
  .action-delete:active { background: var(--danger-bg); }

  .field-row { display: flex; gap: 12px; margin-bottom: 18px; align-items: flex-start; }
  .field-row .ic { color: var(--gold); margin-top: 2px; flex-shrink: 0; }
  .field-row .lbl { font-size: 11px; color: var(--text-muted); margin: 0 0 2px; }
  .field-row .val { margin: 0; color: var(--text); }

  .section-block { border-top: 1px solid var(--border); padding-top: 18px; margin-bottom: 18px; }

  /* Экран входа */
  .login-screen {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 20px;
    background: var(--bg-1);
  }
  .login-screen.open { display: flex; }
  .login-card {
    width: 100%; max-width: 360px; text-align: center;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  }
  .login-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 12px; }
  .login-card h2 { margin: 0 0 2px; font-size: 20px; font-weight: 500; }
  .login-sub { margin: 0 0 22px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .login-lbl { display: block; text-align: left; font-size: 11px; color: var(--text-muted); margin: 0 0 4px; }
  .login-card input {
    width: 100%; box-sizing: border-box; margin-bottom: 14px;
    padding: 11px 12px; font-size: 16px; color: var(--text); /* 16px против авто-зума iPhone */
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; outline: none;
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-error { min-height: 16px; margin: 0 0 10px; font-size: 12px; color: var(--danger); }
  #login-submit {
    width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer;
    background: var(--accent-dark); color: #fff; font-size: 14px; font-weight: 500;
  }
  #login-submit:disabled { opacity: 0.6; }

  /* Calendar modal */
  .calendar-modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.96);
    width: calc(100% - 24px); max-width: 440px;
    max-height: calc(100dvh - 40px); overflow-y: auto;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px; z-index: 61; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    display: none; opacity: 0;
    transition: opacity 0.18s ease, transform 0.18s ease;
    touch-action: pan-y;
  }
  .calendar-modal.open { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #cal-overlay { z-index: 60; }

  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-right: 40px; }
  .cal-head .cal-title { font-size: 16px; font-weight: 500; text-transform: capitalize; }
  .cal-nav-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav-btn:active { background: rgba(180,154,118,0.08); }
  .cal-close {
    position: absolute; top: 22px; right: 16px;
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px;
  }

  .cal-weekdays, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
  }
  .cal-weekdays div {
    text-align: center; font-size: 10px; text-transform: uppercase; color: var(--text-dim);
    padding-bottom: 8px;
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; cursor: default; position: relative;
    font-size: 14px; color: var(--text);
  }
  .cal-day.empty { visibility: hidden; }
  .cal-day.has-leads { cursor: pointer; }
  .cal-day.has-leads:active { background: rgba(180,154,118,0.1); }
  .cal-day.today > span {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}

  .cal-dots {
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    display: flex; justify-content: center; gap: 2px; height: 5px; max-width: 90%; overflow: hidden;
  }
  .cal-dots span { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  body.no-scroll { overflow: hidden; }

  .cal-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .cal-legend .item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .cal-legend .item span { width: 7px; height: 7px; border-radius: 50%; }

  .section-block .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 0 0 10px; }

  @media (max-width: 768px) {
    header, main { padding-left: 16px; padding-right: 16px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tbody tr { padding: 12px 16px; }
    tbody td { padding: 3px 0; }
    td.label::before { content: attr(data-label); display: block; font-size: 10px; text-transform: uppercase; color: var(--text-dim); }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img class="brand-logo" src="images/logo trans.png" alt="Maldives Elite">
    <div>
      <h1 class="serif">Maldives Elite</h1>
      <p>Панель заявок</p>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-indicator">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label"></span>
    </div>
    <button class="bell-btn" id="calendar-btn" aria-label="Календарь заявок">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    </button>
    <button class="bell-btn" id="bell-btn" aria-label="Уведомления">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="dot"></span>
    </button>
    <button class="bell-btn" id="logout-btn" aria-label="Выйти из панели">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="controls">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8FA9AC" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Поиск по имени, телефону, дате">
      <button id="search-clear" type="button" aria-label="Очистить поиск">✕</button>
    </div>
    <div class="filter-chips" id="filters"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Клиент</th><th>Телефон</th><th>Направление</th><th>Даты</th><th>Бюджет</th><th>Статус</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

</main>

<div class="login-screen" id="login-screen">
  <form class="login-card" id="login-form" autocomplete="on">
    <img class="login-logo" src="images/logo trans.png" alt="Maldives Elite">
    <h2 class="serif">Панель заявок</h2>
    <p class="login-sub">Вход для менеджера</p>
    <label class="login-lbl" for="login-email">Почта</label>
    <input id="login-email" type="email" name="email" autocomplete="username" required placeholder="you@example.com">
    <label class="login-lbl" for="login-password">Пароль</label>
    <input id="login-password" type="password" name="password" autocomplete="current-password" required placeholder="••••••••">
    <p class="login-error" id="login-error"></p>
    <button type="submit" id="login-submit">Войти</button>
  </form>
</div>

<div class="overlay" id="overlay"></div>
<div class="overlay" id="cal-overlay"></div>
<div class="calendar-modal" id="calendar-modal"></div>
<div class="drawer" id="drawer"></div>

<script>
  const STATUSES = {
    new: { label: "Новая", color: "var(--st-new)", bg: "var(--st-new-bg)" },
    progress: { label: "В работе", color: "var(--st-progress)", bg: "var(--st-progress-bg)" },
    confirmed: { label: "Подтверждено", color: "var(--st-confirmed)", bg: "var(--st-confirmed-bg)" },
    closed: { label: "Отклонено", color: "var(--st-closed)", bg: "var(--st-closed-bg)" },
  };

  // Демо-данные. В боевой версии массив leads будет приходить из API (Yandex Cloud).
  // Заявки подгружаются с сервера (admin-api). Пустой массив — стартовое
  // состояние до загрузки и для демо-режима без сервера (API_BASE = "").
  let leads = [];

  let state = { query: "", filter: "all", selectedId: null };

  // ---- Слой API (Yandex Cloud) ----
  // Когда появится аккаунт заказчика, сюда встанет URL API Gateway,
  // например "https://xxxxx.apigw.yandexcloud.net". Пусто = демо-режим (пустой список).
  const API_BASE = "";

  // ---- Push-уведомления (Web Push) ----
  // Публичный VAPID-ключ. Сгенерировать: npx web-push generate-vapid-keys
  // Тот же ключ должен стоять в переменной VAPID_PUBLIC_KEY функции form-intake.
  // Пусто = push отключён (всё остальное работает).
  const VAPID_PUBLIC_KEY = "";

  function urlB64ToUint8Array(base64) {
    const pad = "=".repeat((4 - (base64.length % 4)) % 4);
    const b64 = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(b64);
    return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
  }

  // Подписаться на push и отправить подписку на сервер (apiFetch добавит токен).
  async function subscribeToPush() {
    if (!API_BASE || !VAPID_PUBLIC_KEY) return false;
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return false;
    try {
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
        });
      }
      await apiFetch("/push/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub),
      });
      return true;
    } catch (err) {
      console.error("push subscribe failed:", err);
      return false;
    }
  }

  // Тихо переподписаться, если уведомления уже разрешены (вызывается после входа).
  function maybeAutoSubscribePush() {
    if (!API_BASE || !VAPID_PUBLIC_KEY) return;
    if ("Notification" in window && Notification.permission === "granted") {
      setTimeout(() => subscribeToPush(), 1200);
    }
  }

  // ---- Вход по почте и паролю ----
  // Токен сессии выдаёт сервер (admin-api, POST /login) после проверки
  // почты и пароля; хранится на устройстве, чтобы не входить каждый раз.

  function showLogin(errorMsg = "") {
    document.getElementById("login-error").textContent = errorMsg;
    document.getElementById("login-screen").classList.add("open");
    document.getElementById("login-email").focus();
  }
  function hideLogin() {
    document.getElementById("login-screen").classList.remove("open");
  }

  async function apiFetch(path, options = {}) {
    const token = localStorage.getItem("adminToken") || "";
    const r = await fetch(`${API_BASE}${path}`, {
      ...options,
      headers: { ...(options.headers || {}), Authorization: `Bearer ${token}` },
    });
    if (r.status === 401) { // сессия истекла или токен неверный — снова на вход
      localStorage.removeItem("adminToken");
      showLogin();
      throw new Error("нужен вход");
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r;
  }

  const api = {
    enabled: () => Boolean(API_BASE),
    async login(email, password) {
      if (!API_BASE) { // демо-режим: вход принимает любые данные
        await new Promise(res => setTimeout(res, 400));
        localStorage.setItem("adminToken", "demo");
        return;
      }
      const r = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (r.status === 401) throw new Error("Неверная почта или пароль");
      if (!r.ok) throw new Error(`Сервер недоступен (HTTP ${r.status})`);
      const { token } = await r.json();
      localStorage.setItem("adminToken", token);
    },
    async loadLeads() {
      return (await apiFetch("/leads")).json();
    },
    async updateStatus(id, status) {
      await apiFetch(`/leads/${encodeURIComponent(id)}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status }),
      });
    },
    async removeLead(id) {
      await apiFetch(`/leads/${encodeURIComponent(id)}`, { method: "DELETE" });
    },
  };

  // Выполняет запрос к API, показывая индикатор синхронизации.
  async function syncCall(fn) {
    setSyncState(true);
    try {
      await fn();
    } catch (e) {
      if (e.message !== "нужен вход") alert("Ошибка синхронизации с сервером: " + e.message);
    } finally {
      setSyncState(false);
    }
  }

  function formatDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("ru-RU", { day: "2-digit", month: "short" });
  }
  function formatDateTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("ru-RU", { day: "2-digit", month: "long", year: "numeric" }) + ", " +
      d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
  }
  function formatMoney(n) {
    if (!n) return "—";
    return new Intl.NumberFormat("ru-RU").format(n) + " ₽";
  }
  function phoneDigits(phone) {
    return (phone || "").replace(/[^\d]/g, "");
  }
  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s ?? "";
    return d.innerHTML;
  }

  function getCounts() {
    const c = { all: leads.length, new: 0, progress: 0, confirmed: 0, closed: 0 };
    leads.forEach(l => c[l.status]++);
    return c;
  }

  function leadSearchIndex(l) {
    const d = new Date(l.departDate);
    const shortDate = formatDate(l.departDate); // "14 сент"
    const longDate = isNaN(d) ? "" : d.toLocaleDateString("ru-RU", { day: "2-digit", month: "long", year: "numeric" }); // "14 сентября 2026"
    const numDate = isNaN(d) ? "" : d.toLocaleDateString("ru-RU"); // "14.09.2026"
    return [
      l.client, l.phone, l.destination, l.departureCity, l.group, l.villa, l.meal,
      l.nights, l.departDate, shortDate, longDate, numDate
    ].join(" ").toLowerCase();
  }

  function getFiltered() {
    const q = state.query.trim().toLowerCase();
    return leads
      .filter(l => state.filter === "all" || l.status === state.filter)
      .filter(l => !q || leadSearchIndex(l).includes(q))
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }

  function renderStats() {
    const c = getCounts();
    const cards = [
      { key: "all", label: "Всего заявок", value: c.all },
      { key: "new", label: "Новые", value: c.new },
      { key: "progress", label: "В работе", value: c.progress },
      { key: "confirmed", label: "Подтверждено", value: c.confirmed },
    ];
    document.getElementById("stats").innerHTML = cards.map(s => `
      <button class="stat-card ${state.filter === s.key ? "active" : ""}" data-filter="${s.key}">
        <p class="num serif">${s.value}</p>
        <p class="lbl">${s.label}</p>
      </button>
    `).join("");
  }

  function renderFilters() {
    const keys = ["all", "new", "progress", "confirmed", "closed"];
    document.getElementById("filters").innerHTML = keys.map(k => `
      <button class="chip ${state.filter === k ? "active" : ""}" data-filter="${k}">
        ${k === "all" ? "Все" : STATUSES[k].label}
      </button>
    `).join("");
  }

  function renderTable() {
    const rows = getFiltered();
    const body = document.getElementById("table-body");
    if (rows.length === 0) {
      body.innerHTML = `<tr class="empty-row"><td colspan="6">Заявок не найдено</td></tr>`;
      return;
    }
    body.innerHTML = rows.map(l => {
      const st = STATUSES[l.status];
      return `
        <tr data-id="${l.id}">
          <td class="label" data-label="Клиент">${esc(l.client)}</td>
          <td class="label muted" data-label="Телефон">${esc(l.phone)}</td>
          <td class="label" data-label="Направление">${esc(l.destination)}</td>
          <td class="label muted" data-label="Даты">${formatDate(l.departDate)} · ${esc(l.nights)}</td>
          <td class="label muted" data-label="Бюджет">${formatMoney(l.budget)}</td>
          <td class="label" data-label="Статус"><span class="status-pill" style="color:${st.color};background:${st.bg}">${st.label}</span></td>
        </tr>
      `;
    }).join("");
  }

  function renderDrawer() {
    const overlay = document.getElementById("overlay");
    const drawer = document.getElementById("drawer");
    const lead = leads.find(l => l.id === state.selectedId);

    if (!lead) {
      overlay.classList.remove("open");
      drawer.classList.remove("open");
      drawer.style.transform = "";
      overlay.style.opacity = "";
      return;
    }

    const statusButtons = Object.entries(STATUSES).map(([key, st]) => `
      <button class="status-btn" data-status="${key}" style="${lead.status === key ? `border-color:${st.color};color:${st.color};background:${st.bg}` : ""}">
        ${st.label}
      </button>
    `).join("");

    drawer.innerHTML = `
      <div class="drag-handle" id="drag-handle"><div class="bar"></div></div>
      <div class="drawer-head">
        <div>
          <p class="eyebrow">Заявка #${String(lead.id).padStart(4, "0")}</p>
          <h2 class="serif">${esc(lead.client)}</h2>
        </div>
        <button class="close-btn" id="close-drawer">✕</button>
      </div>

      <div class="contact-row">
        <a class="contact-btn" href="tel:+${phoneDigits(lead.phone)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Позвонить
        </a>
        <a class="contact-btn" href="tg://resolve?phone=${phoneDigits(lead.phone)}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.05 3.76 2.9 10.9c-1.23.5-1.22 1.2-.22 1.5l4.66 1.45 1.8 5.5c.22.55.4.77.8.77.4 0 .58-.18.8-.4l1.9-1.86 4.02 2.97c.74.4 1.28.2 1.46-.68l2.65-12.5c.28-1.1-.42-1.6-1.72-1.9z"/></svg>
          Telegram
        </a>
        <a class="contact-btn" href="whatsapp://send?phone=${phoneDigits(lead.phone)}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.7-.85-2-.95-.27-.1-.46-.15-.66.15-.2.3-.75.94-.92 1.14-.17.2-.34.22-.63.07-.3-.15-1.24-.46-2.36-1.46-.87-.78-1.46-1.74-1.63-2.04-.17-.3-.02-.46.13-.6.13-.14.3-.35.45-.53.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.66-1.6-.9-2.18-.24-.58-.48-.5-.66-.5h-.56c-.2 0-.52.07-.79.37-.27.3-1.04 1-1.04 2.5 0 1.48 1.06 2.9 1.2 3.1.15.2 2.1 3.2 5.1 4.48.71.3 1.27.49 1.7.63.72.23 1.37.2 1.88.12.57-.08 1.7-.7 1.95-1.36.24-.67.24-1.24.17-1.36-.07-.12-.27-.2-.57-.35z"/><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3.1-.43-4.4-1.24l-.32-.2-3 .78.8-2.9-.2-.33A8.2 8.2 0 1 1 12 20.2z"/></svg>
          WhatsApp
        </a>
      </div>

      <div class="primary-actions">
        <button class="action-delete" id="btn-delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Удалить заявку
        </button>
      </div>

      <div class="status-row">${statusButtons}</div>

      <div class="field-row"><span class="lbl">Телефон</span></div>
      <p class="val" style="margin:-14px 0 18px">${esc(lead.phone)}</p>
      <p class="lbl">Направление</p><p class="val" style="margin:0 0 18px">${esc(lead.destination)}</p>
      <p class="lbl">Вылет</p><p class="val" style="margin:0 0 18px">${formatDate(lead.departDate)} из г. ${esc(lead.departureCity)} · ${esc(lead.nights)}</p>
      <p class="lbl">Бюджет</p><p class="val" style="margin:0 0 18px">${formatMoney(lead.budget)}</p>
      <p class="lbl">Состав группы</p><p class="val" style="margin:0 0 18px">${esc(lead.group)}</p>

      <div class="section-block">
        <p class="eyebrow">Проживание</p>
        <p class="val" style="margin:0 0 6px">Вилла: ${esc(lead.villa)}</p>
        <p class="val" style="margin:0 0 6px">Питание: ${esc(lead.meal)}</p>
        <p class="val" style="margin:0">Риф для снорклинга: ${lead.reef ? "нужен" : "не требуется"}</p>
      </div>

      ${lead.notes ? `
        <div class="section-block">
          <p class="eyebrow">Комментарий клиента</p>
          <p class="val" style="margin:0">${esc(lead.notes)}</p>
        </div>
      ` : ""}

      <div class="section-block">
        <p class="eyebrow">Получена</p>
        <p class="val" style="margin:0">${formatDateTime(lead.createdAt)}</p>
      </div>
    `;

    overlay.classList.add("open");
    drawer.classList.add("open");

    document.getElementById("close-drawer").addEventListener("click", () => {
      state.selectedId = null;
      renderDrawer();
    });
    drawer.querySelectorAll(".status-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        lead.status = btn.dataset.status;
        if (api.enabled()) syncCall(() => api.updateStatus(lead.id, lead.status));
        else triggerSync();
        renderAll();
        renderDrawer();
      });
    });

    document.getElementById("btn-delete").addEventListener("click", () => {
      if (!confirm(`Удалить заявку от ${lead.client}? Это действие нельзя отменить.`)) return;
      leads = leads.filter(l => l.id !== lead.id);
      state.selectedId = null;
      if (api.enabled()) syncCall(() => api.removeLead(lead.id));
      else triggerSync();
      renderAll();
      renderDrawer();
    });

    setupSwipeToClose(drawer, overlay);
  }

  function setupSwipeToClose(drawer, overlay) {
    let startY = 0;
    let currentY = 0;
    let tracking = false;
    let dragging = false;

    function onStart(clientY) {
      startY = clientY;
      currentY = clientY;
      tracking = true;
      dragging = false;
    }

    function onMove(clientY, e) {
      if (!tracking) return;
      currentY = clientY;
      const dy = currentY - startY;

      // Разрешаем жест только когда контент прокручен наверх и палец тянет вниз
      if (!dragging) {
        if (dy > 6 && drawer.scrollTop <= 0) {
          dragging = true;
          drawer.classList.add("dragging");
        } else {
          return;
        }
      }

      if (dy > 0) {
        if (e && e.cancelable) e.preventDefault();
        drawer.style.transform = `translateY(${dy}px)`;
        overlay.style.opacity = String(Math.max(0, 1 - dy / 300));
      }
    }

    function onEnd() {
      if (!tracking) return;
      const dy = currentY - startY;
      tracking = false;

      if (dragging) {
        drawer.classList.remove("dragging");
        if (dy > 110) {
          state.selectedId = null;
          renderDrawer();
        } else {
          drawer.style.transform = "";
          overlay.style.opacity = "";
        }
        dragging = false;
      }
    }

    drawer.addEventListener("touchstart", (e) => onStart(e.touches[0].clientY), { passive: true });
    drawer.addEventListener("touchmove", (e) => onMove(e.touches[0].clientY, e), { passive: false });
    drawer.addEventListener("touchend", onEnd);

    drawer.addEventListener("mousedown", (e) => {
      if (e.target.closest("button")) return;
      onStart(e.clientY);
      const move = (ev) => onMove(ev.clientY, ev);
      const up = () => {
        onEnd();
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
      };
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    });
  }

  function renderAll() {
    renderStats();
    renderFilters();
    renderTable();
  }

  // Рядом с точкой — «Сегодня» и текущая дата (точка мигает во время синхронизации)
  function renderTodayLabel() {
    const now = new Date();
    const date = now.toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });
    document.getElementById("sync-label").innerHTML = `<span>Сегодня</span><span>${date}</span>`;
  }
  renderTodayLabel();
  setInterval(renderTodayLabel, 60 * 1000); // обновляется само после полуночи

  function setSyncState(syncing) {
    document.getElementById("sync-dot").classList.toggle("syncing", syncing);
  }

  // Имитация синхронизации для демо-режима (без API)
  function triggerSync(duration = 700) {
    setSyncState(true);
    setTimeout(() => setSyncState(false), duration);
  }

  document.getElementById("logout-btn").addEventListener("click", () => {
    if (!confirm("Выйти из панели заявок?")) return;
    localStorage.removeItem("adminToken");
    showLogin();
  });

  document.getElementById("bell-btn").addEventListener("click", async () => {
    if (!("Notification" in window)) {
      alert("Этот браузер не поддерживает уведомления. На iPhone добавьте админку на экран «Домой» через Safari → Поделиться, затем откройте её как приложение.");
      return;
    }
    if (Notification.permission === "denied") {
      alert("Уведомления запрещены в настройках. Разрешите их для этого сайта в настройках браузера/телефона.");
      return;
    }
    let perm = Notification.permission;
    if (perm !== "granted") perm = await Notification.requestPermission();
    if (perm !== "granted") return;

    if (!API_BASE || !VAPID_PUBLIC_KEY) {
      alert("Уведомления разрешены ✓\nPush заработает после подключения сервера (заполнить API_BASE и VAPID_PUBLIC_KEY).");
      return;
    }
    const ok = await subscribeToPush();
    alert(ok
      ? "Готово! Push о новых заявках включён ✓"
      : "Разрешение есть, но подписка не удалась. Проверьте VAPID-ключ и адрес API.");
  });

  // ---- Календарь заявок ----
  const WEEKDAYS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
  const today = new Date();
  let calView = { year: today.getFullYear(), month: today.getMonth() };

  function isoDay(date) {
    return date.toISOString().slice(0, 10);
  }

  function leadsByDay(year, month) {
    const map = {};
    leads.forEach(l => {
      if (!l.departDate) return;
      const d = new Date(l.departDate);
      if (d.getFullYear() === year && d.getMonth() === month) {
        const day = d.getDate();
        (map[day] = map[day] || []).push(l);
      }
    });
    return map;
  }

  function renderCalendar() {
    const { year, month } = calView;
    const monthLabel = new Date(year, month, 1).toLocaleDateString("ru-RU", { month: "long", year: "numeric" });
    const firstDay = new Date(year, month, 1);
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const leadingBlanks = (firstDay.getDay() + 6) % 7; // понедельник = 0
    const byDay = leadsByDay(year, month);
    const isTodayMonth = today.getFullYear() === year && today.getMonth() === month;

    let cells = "";
    for (let i = 0; i < leadingBlanks; i++) cells += `<div class="cal-day empty"></div>`;
    for (let day = 1; day <= daysInMonth; day++) {
      const dayLeads = byDay[day] || [];
      const isToday = isTodayMonth && today.getDate() === day;
      const dots = dayLeads.map(l => `<span style="background:${STATUSES[l.status].color}"></span>`).join("");
      cells += `
        <div class="cal-day ${dayLeads.length ? "has-leads" : ""} ${isToday ? "today" : ""}" data-day="${day}">
          <span>${day}</span>
          <div class="cal-dots">${dots}</div>
        </div>
      `;
    }

    const legend = Object.entries(STATUSES).map(([key, st]) => `
      <div class="item"><span style="background:${st.color}"></span>${st.label}</div>
    `).join("");

    const modal = document.getElementById("calendar-modal");
    modal.innerHTML = `
      <button class="cal-close" id="cal-close">✕</button>
      <div class="cal-head">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <span class="cal-title serif">${monthLabel}</span>
        <button class="cal-nav-btn" id="cal-next">›</button>
      </div>
      <div class="cal-weekdays">${WEEKDAYS.map(w => `<div>${w}</div>`).join("")}</div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend">${legend}</div>
    `;

    document.getElementById("cal-close").addEventListener("click", closeCalendar);
    document.getElementById("cal-prev").addEventListener("click", () => changeMonth(-1));
    document.getElementById("cal-next").addEventListener("click", () => changeMonth(1));
    modal.querySelectorAll(".cal-day.has-leads").forEach(el => {
      el.addEventListener("click", () => {
        const day = el.dataset.day;
        const mm = String(calView.month + 1).padStart(2, "0");
        const dd = String(day).padStart(2, "0");
        setSearchQuery(`${dd}.${mm}.${calView.year}`);
        state.filter = "all";
        closeCalendar();
        renderAll();
      });
    });
  }

  function changeMonth(delta) {
    calView.month += delta;
    if (calView.month < 0) { calView.month = 11; calView.year--; }
    if (calView.month > 11) { calView.month = 0; calView.year++; }
    renderCalendar();
  }

  function openCalendar() {
    calView = { year: today.getFullYear(), month: today.getMonth() };
    renderCalendar();
    document.getElementById("cal-overlay").classList.add("open");
    document.getElementById("calendar-modal").classList.add("open");
    document.body.classList.add("no-scroll");
  }
  function closeCalendar() {
    document.getElementById("cal-overlay").classList.remove("open");
    document.getElementById("calendar-modal").classList.remove("open");
    document.body.classList.remove("no-scroll");
  }

  document.getElementById("calendar-btn").addEventListener("click", openCalendar);
  document.getElementById("cal-overlay").addEventListener("click", closeCalendar);

  // Свайп по календарю листает месяцы
  (function () {
    const modal = document.getElementById("calendar-modal");
    let startX = 0, startY = 0;
    modal.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    modal.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        changeMonth(dx < 0 ? 1 : -1);
      }
    }, { passive: true });
  })();

  document.addEventListener("click", (e) => {
    const filterBtn = e.target.closest("[data-filter]");
    if (filterBtn) {
      state.filter = filterBtn.dataset.filter;
      renderAll();
      return;
    }
    const row = e.target.closest("tr[data-id]");
    if (row) {
      state.selectedId = Number(row.dataset.id);
      renderDrawer();
      return;
    }
    if (e.target.id === "overlay") {
      state.selectedId = null;
      renderDrawer();
    }
  });

  // Устанавливает запрос поиска, показывая/скрывая крестик очистки
  function setSearchQuery(q) {
    state.query = q;
    const input = document.getElementById("search");
    input.value = q;
    input.closest(".search-box").classList.toggle("has-value", Boolean(q));
  }

  document.getElementById("search").addEventListener("input", (e) => {
    setSearchQuery(e.target.value);
    renderTable();
  });

  document.getElementById("search-clear").addEventListener("click", () => {
    setSearchQuery("");
    renderTable();
    document.getElementById("search").focus();
  });

  async function loadFromServer() {
    await syncCall(async () => {
      leads = await api.loadLeads();
      renderAll();
    });
    maybeAutoSubscribePush();
  }

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("login-submit");
    btn.disabled = true;
    document.getElementById("login-error").textContent = "";
    try {
      await api.login(
        document.getElementById("login-email").value.trim().toLowerCase(),
        document.getElementById("login-password").value
      );
      hideLogin();
      if (api.enabled()) await loadFromServer();
      else triggerSync();
    } catch (err) {
      document.getElementById("login-error").textContent = err.message;
    } finally {
      btn.disabled = false;
    }
  });

  renderAll();
  if (api.enabled()) {
    if (localStorage.getItem("adminToken")) loadFromServer();
    else showLogin();
  } else {
    triggerSync(1200);
  }

  // PWA: service worker (не работает при открытии файла напрямую, только по http/https)
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
